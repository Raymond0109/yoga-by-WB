<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:," />
<title>Yoga Pose Analyzer — 标准体式对比 + 骨骼/肌肉</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --line:#30363d; --txt:#e6edf3; --accent:#58a6ff; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:14px/1.5 system-ui,-apple-system,sans-serif; }
  header { padding:12px 16px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:16px; }
  .controls { display:flex; gap:8px; flex-wrap:wrap; padding:12px 16px;
              border-bottom:1px solid var(--line); align-items:center; }
  button, label.btn, select { background:var(--panel); color:var(--txt); border:1px solid var(--line);
              padding:8px 12px; border-radius:6px; cursor:pointer; font-size:14px; }
  button:hover, label.btn:hover, select:hover { border-color:var(--accent); }
  input[type=file] { display:none; }
  main { display:flex; gap:16px; padding:16px; align-items:flex-start; flex-wrap:wrap; }
  .stage { position:relative; flex:0 0 auto; }
  canvas { background:#000; border:1px solid var(--line); border-radius:8px;
           max-width:min(90vw,640px); height:auto; display:block; }
  .panel { flex:1 1 320px; min-width:300px; max-width:420px; background:var(--panel);
           border:1px solid var(--line); border-radius:8px; padding:12px; }
  .panel h2 { margin:0 0 8px; font-size:14px; color:var(--accent); }
  .status { padding:12px 16px; color:#8b949e; }
  .legend { font-size:12px; color:#8b949e; margin-top:8px; }
  .stage-row { display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; }
  .stage3d { flex:0 0 auto; }
  #view3d { background:#0a0d12; border:1px solid var(--line); border-radius:8px;
            width:min(42vw,420px); height:auto; aspect-ratio:3/4; display:block; }
  .score { font-size:28px; font-weight:700; }
  .rule { border-top:1px solid var(--line); padding:8px 0; }
  .rule .lbl { font-weight:600; }
  .badge { display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px; margin-left:6px; }
  .ok { background:#1f6f3f; color:#d7ffd9; }
  .warn { background:#9e6a1f; color:#ffe9c7; }
  .off { background:#9e2a2a; color:#ffd7d7; }
  .corr { font-size:12px; color:#e3b341; margin-top:3px; }
  .val { font-size:12px; color:#8b949e; }
  #fbBody { max-height: calc(100vh - 230px); overflow-y: auto; }
  .muscle-row { display:flex; align-items:center; gap:8px; margin:4px 0; font-size:12px; }
  .bar { height:10px; border-radius:5px; background:#30363d; flex:1; overflow:hidden; }
  .bar > i { display:block; height:100%; }
  .chk { display:inline-flex; align-items:center; gap:4px; color:#c9d1d9; font-size:14px; cursor:pointer; }
  .chk input { accent-color:#7ee787; }
  .det { color:#7ee787; font-weight:600; min-height:18px; margin:2px 0 8px; }
  .asana-info { border:1px solid var(--line); border-radius:6px; padding:8px 10px; margin-bottom:8px; font-size:12px; background:#0e1116; }
  .asana-info .ttl { color:var(--accent); font-weight:700; font-size:13px; }
  .asana-info .sub { color:#8b949e; margin:2px 0 6px; }
  .asana-info h4 { margin:6px 0 3px; font-size:12px; color:#c9d1d9; }
  .asana-info ul { margin:0; padding-left:16px; }
  .asana-info li { margin:1px 0; line-height:1.5; }
  .asana-info .cau li { color:#e3b341; }
  .asana-info .det2 li { color:#7ee787; }
</style>
</head>
<body>
<header><h1>瑜伽体式体态分析 — 标准体式对比 + 解剖骨骼/肌肉</h1></header>

<div class="controls">
  <select id="asanaSel"><option value="">（不选·仅检测）</option></select>
  <label class="chk"><input type="checkbox" id="chkAuto"> 🤖 自动识别体式</label>
  <button id="btnCamera">▶ 启动摄像头</button>
  <label class="btn">📷 上传图片<input id="fileImage" type="file" accept="image/*"></label>
  <label class="btn">🎬 上传视频<input id="fileVideo" type="file" accept="video/*"></label>
  <button id="btnStop">■ 停止</button>
  <button id="btnSnap">📸 保存截图</button>
</div>

<main>
  <div class="stage-row">
    <div class="stage">
      <canvas id="view" width="640" height="480"></canvas>
      <div class="legend">骨骼=解剖骨 · 肌肉=解剖肌腹(冷=休息，越红=发力越强) · 橙=手掌 · 红圈=低可见度</div>
    </div>
    <div class="stage3d">
      <canvas id="view3d"></canvas>
      <label class="v3d-ctrl"><input type="checkbox" id="chkMuscles3d" checked /> 肌肉发力着色</label>
      <div class="legend">3D 解剖 avatar（拖拽旋转 · 滚轮缩放）· 半透明橙 = 标准体式 ghost · 蓝→红 = 发力冷暖</div>
    </div>
  </div>
  <div class="panel" id="fbPanel">
    <h2>对比与纠正</h2>
    <div id="detLabel" class="det"></div>
    <div id="asanaInfo" class="asana-info" style="display:none"></div>
    <div id="fbBody"><div class="val">选择「标准体式」或勾选「🤖 自动识别」，然后：① 点击「启动摄像头」（需在浏览器打开本页并允许摄像头权限，localhost 可用）；② 或「上传图片 / 视频」。分析开始后此处显示匹配度与纠正建议。</div></div>
  </div>
</main>

<div class="status" id="status">未连接。选择体式后点击「启动摄像头」或上传文件。</div>

<script>
const POSE_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,7], [0,4],[4,5],[5,6],[6,8], [9,10],
  [11,12],[11,13],[13,15],[15,17],[15,19],[15,21],
  [12,14],[14,16],[16,18],[16,20],[16,22],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[27,29],[27,31],
  [24,26],[26,28],[28,30],[28,32],
];
window.POSE_CONNECTIONS = POSE_CONNECTIONS;
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4], [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12], [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20], [0,17],
];
const MIRROR = {11:12,12:11,13:14,14:13,15:16,16:15,23:24,24:23,25:26,26:25,27:28,28:27};

const canvas = document.getElementById('view');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const fbBody = document.getElementById('fbBody');
let ws = null, W = 0, H = 0, startTimer = null;
const BASE = location.host ? '' : 'http://127.0.0.1:8000';   // file:// 预览时回退到本地服务器
const WS_HOST = location.host || '127.0.0.1:8000';
let currentAsana = '';

function setStatus(t){ statusEl.textContent = t; }

// Fetch the standard-pose world landmarks for `asana` and feed them to the
// 3D avatar as a translucent ghost overlay (no-op for the 3 unreferenced
// asanas: handstand / crow / extended_hand_to_toe).
let _ghostAsana = null;
function loadGhost(id){
  if (!id || id === '__unknown__' || id === _ghostAsana){
    if (!id || id === '__unknown__'){ _ghostAsana = null; window.Avatar3D && window.Avatar3D.clearGhost(); }
    return;
  }
  _ghostAsana = id;
  fetch(BASE + '/api/reference_world?asana=' + encodeURIComponent(id))
    .then(r => r.json()).then(j => {
      if (window.Avatar3D) window.Avatar3D.setGhost(j.world_landmarks || null);
    }).catch(() => {});
}

// ---- asana picker ----
let ASANA_MAP = {};
function renderAsanaInfo(a){
  const box = document.getElementById('asanaInfo');
  if (!box) return;
  if (!a){ box.style.display = 'none'; box.innerHTML = ''; return; }
  const li = arr => (arr || []).map(x => `<li>${x}</li>`).join('');
  const aliases = (a.aliases || []).join(' · ');
  box.innerHTML = `
    <div class="ttl">${a.name_zh}　<span style="font-weight:400;color:#8b949e">${a.name_sanskrit || ''}</span></div>
    ${aliases ? `<div class="sub">别名：${aliases}</div>` : ''}
    ${a.benefits ? `<div class="sub">功效：${a.benefits}</div>` : ''}
    ${(a.details && a.details.length) ? `<h4>✅ 顺位要点</h4><ul class="det2">${li(a.details)}</ul>` : ''}
    ${(a.cautions && a.cautions.length) ? `<h4>⚠️ 常见错误 / 注意</h4><ul class="cau">${li(a.cautions)}</ul>` : ''}`;
  box.style.display = 'block';
}
fetch(BASE + '/api/asanas').then(r => r.json()).then(list => {
  const sel = document.getElementById('asanaSel');
  for (const a of list){
    ASANA_MAP[a.id] = a;
    const o = document.createElement('option');
    o.value = a.id;
    o.textContent = `${a.name_zh} · ${a.name_en} (${'★'.repeat(a.difficulty)})`;
    sel.appendChild(o);
  }
  sel.onchange = () => { currentAsana = sel.value; renderAsanaInfo(ASANA_MAP[sel.value]); loadGhost(sel.value); };
}).catch(() => setStatus('无法加载体式库，请确认已用 http://127.0.0.1:8000 打开本页。'));

function connect(){
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  ws = new WebSocket(`ws://${WS_HOST}/ws`);
  ws.onopen = () => setStatus('已连接，等待帧…');
  ws.onclose = () => { setStatus('连接已关闭。'); ws = null; };
  ws.onerror = () => setStatus('连接错误：请改用 http://127.0.0.1:8000 打开本页（不要用 file:// 预览）。');
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}
function startCmd(payload){
  connect();
  if (startTimer) clearInterval(startTimer);
  startTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN){
      const auto = document.getElementById('chkAuto').checked;
      ws.send(JSON.stringify({type:'start', asanaId: auto ? '__auto__' : currentAsana, ...payload}));
      clearInterval(startTimer); startTimer = null;
    }
  }, 50);
}

// ---- client-side webcam capture (getUserMedia) ----
// Captures the *browser's* own camera and streams JPEG frames to the server,
// which detects + compares and echoes the feedback back. This makes the
// "启动摄像头" feature work even when the server machine has no webcam.
let clientCam = null, clientCamRAF = null, clientVideo = null;
async function startClientCamera(){
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    setStatus('浏览器不支持 getUserMedia，改用服务端摄像头（需本机有摄像头）。');
    startCmd({source:'camera'});
    return;
  }
  setStatus('正在请求摄像头权限…');
  try {
    const stream = await navigator.mediaDevices.getUserMedia(
      {video:{facingMode:'user', width:{ideal:640}}, audio:false});
    clientCam = stream;
    const v = document.createElement('video');
    v.srcObject = stream; v.muted = true; v.playsInline = true;
    clientVideo = v;
    await v.play();
    connect();
    const sendStart = () => {
      if (ws && ws.readyState === WebSocket.OPEN){
        const auto = document.getElementById('chkAuto').checked;
        ws.send(JSON.stringify({type:'start', asanaId: auto ? '__auto__' : currentAsana, source:'client-camera'}));
        fbBody.innerHTML = '<div class="val">已连接摄像头，正在分析画面…</div>';
        fbSkeletonKey = null;
        loopClientCamera();
      } else if (ws && ws.readyState === WebSocket.CONNECTING){
        setTimeout(sendStart, 50);
      } else {
        setStatus('WebSocket 未连接，无法启动摄像头。');
      }
    };
    sendStart();
  } catch (err){
    clientCam = null;
    setStatus('摄像头打开失败: ' + err.message +
      '。若预览环境禁止摄像头，请在浏览器直接打开 http://127.0.0.1:8000 并允许权限；或用「上传图片/视频」。');
  }
}
function loopClientCamera(){
  const c = document.createElement('canvas');
  const cx = c.getContext('2d');
  let last = 0;
  const tick = () => {
    if (!clientCam || !clientVideo) return;
    const vw = clientVideo.videoWidth, vh = clientVideo.videoHeight;
    const now = performance.now();
    if (vw && vh && now - last >= 66){   // ~15 fps
      last = now;
      // cap longest side to 640 to keep the WebSocket payload reasonable
      const scale = Math.min(1, 640 / Math.max(vw, vh));
      const w = Math.round(vw * scale), h = Math.round(vh * scale);
      c.width = w; c.height = h;
      cx.drawImage(clientVideo, 0, 0, w, h);
      const data = c.toDataURL('image/jpeg', 0.7);
      if (ws && ws.readyState === WebSocket.OPEN){
        ws.send(JSON.stringify({type:'frame', data}));
      }
    }
    clientCamRAF = requestAnimationFrame(tick);
  };
  clientCamRAF = requestAnimationFrame(tick);
}
function stopClientCamera(){
  if (clientCamRAF){ cancelAnimationFrame(clientCamRAF); clientCamRAF = null; }
  if (clientCam){ clientCam.getTracks().forEach(t => t.stop()); clientCam = null; }
  clientVideo = null;
}
function handleMessage(msg){
  if (msg.type === 'ready'){ setStatus('已连接摄像头，分析中…'); return; }
  if (msg.type === 'error'){
    setStatus('错误: ' + msg.msg);
    showPanelError('⚠️ ' + msg.msg);
    return;
  }
  if (msg.type !== 'frame') return;
  drawFrame(msg);
}

// Show a prominent error inside the feedback panel (not just the status bar)
// so the user never stares at an empty panel when something goes wrong.
function showPanelError(text){
  const box = document.getElementById('asanaInfo');
  if (box) box.style.display = 'none';
  fbBody.innerHTML = `<div class="val" style="color:#f85149;line-height:1.6">${text}</div>`;
  fbSkeletonKey = null;
}

function drawFrame(msg){
  const img = new Image();
  img.onload = () => {
    // Canvas drawing must never block the feedback panel. If drawBones /
    // drawMuscles throws (e.g. an unusual live-webcam landmark set), the
    // compare & correct panel and detected label must still update.
    try {
      canvas.width = msg.width; canvas.height = msg.height;
      ctx.drawImage(img, 0, 0, msg.width, msg.height);
      const pose = (msg.poses || [])[0];
      if (pose){
        try {
          drawBones(pose.landmarks, msg.width, msg.height);
          drawMuscles(pose.landmarks, pose.world_landmarks, msg.width, msg.height, msg.feedback);
        } catch (e) { /* swallow drawing errors, keep feedback alive */ }
        if (window.Avatar3D && pose.world_landmarks) window.Avatar3D.update(pose.world_landmarks, msg.feedback);
        if (msg.skeleton_ok === false){
          ctx.fillStyle = 'rgba(248,81,73,0.9)'; ctx.font = 'bold 14px system-ui, sans-serif';
          ctx.fillText('⚠ 骨骼数据异常（比例失调），本帧对比结果可能不准确', 20, msg.height - 16);
        }
      } else {
        ctx.fillStyle = '#f85149'; ctx.font = 'bold 16px system-ui, sans-serif';
        ctx.fillText('未检测到人体。参考插画/卡通可能导致检测失败，建议使用真人照片。', 20, 40);
      }
      for (const hand of (msg.hands || [])) drawHands(hand.landmarks, msg.width, msg.height, hand.handedness);
      const nPose = (msg.poses || []).length;
      const nHand = (msg.hands || []).length;
      if (!nPose && !nHand) setStatus('未检测到人体/手掌。');
      else setStatus(`人体 ${nPose} · 手掌 ${nHand} · ${msg.width}×${msg.height}`);
    } catch (e) { /* swallow canvas errors */ }

    // Feedback + detected label: always update, independent of canvas drawing.
    if (msg.feedback) { try { renderFeedback(msg.feedback); } catch (e) {} }
    const det = msg.feedback && msg.feedback.detected;
    const detEl = document.getElementById('detLabel');
    if (detEl) {
      if (!det) detEl.textContent = '';
      else if (det.id === '__unknown__') detEl.textContent = '🤖 自动识别：未识别（可能不在当前体式库中）';
      else if (det.low_confidence) {
        detEl.textContent = `🤖 自动识别（低置信度猜测）：${det.name_zh} · 匹配度 ${det.score}%`;
        if (ASANA_MAP[det.id]) renderAsanaInfo(ASANA_MAP[det.id]);
      } else {
        detEl.textContent = `🤖 自动识别：${det.name_zh} · 匹配度 ${det.score}%`;
        if (document.getElementById('chkAuto').checked && ASANA_MAP[det.id]) renderAsanaInfo(ASANA_MAP[det.id]);
      }
      if (det && det.id && det.id !== '__unknown__' && ASANA_MAP[det.id]) loadGhost(det.id);
    }
  };
  img.src = (msg.frame && msg.frame.startsWith('data:')) ? msg.frame : 'data:image/jpeg;base64,' + msg.frame;
}

// ===== anatomical skeleton =====
function drawBones(landmarks, w, h){
  // bone shafts: dark outline + bone-colored core
  for (const [a, b] of POSE_CONNECTIONS){
    const pa = landmarks[a], pb = landmarks[b];
    if (!pa || !pb) continue;
    if ((pa.v !== undefined && pa.v < 0.2) || (pb.v !== undefined && pb.v < 0.2)) continue;
    const x1 = pa.x*w, y1 = pa.y*h, x2 = pb.x*w, y2 = pb.y*h;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#2a2f36'; ctx.lineWidth = 13;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.strokeStyle = '#e9e0c8'; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  // joint heads (epiphyses)
  const joints = [11,12,13,14,15,16,23,24,25,26,27,28];
  for (const j of joints){
    const p = landmarks[j]; if (!p) continue;
    const x = p.x*w, y = p.y*h;
    ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2);
    ctx.fillStyle = '#e9e0c8'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#2a2f36'; ctx.stroke();
    if (p.v !== undefined && p.v < 0.5){
      ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2);
      ctx.strokeStyle = '#f85149'; ctx.lineWidth = 2; ctx.stroke();
    }
  }
  // spine + vertebra ticks + clavicles
  const A = landmarks[11], B = landmarks[12], C = landmarks[23], D = landmarks[24];
  if (A && B && C && D){
    const sm = {x:((A.x+B.x)/2)*w, y:((A.y+B.y)/2)*h};
    const hm = {x:((C.x+D.x)/2)*w, y:((C.y+D.y)/2)*h};
    ctx.strokeStyle = '#cfc6ad'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sm.x,sm.y); ctx.lineTo(hm.x,hm.y); ctx.stroke();
    const dx = hm.x-sm.x, dy = hm.y-sm.y, len = Math.hypot(dx,dy)||1, nx = -dy/len, ny = dx/len;
    for (let i = 1; i < 6; i++){
      const t = i/6, cx = sm.x+dx*t, cy = sm.y+dy*t;
      ctx.beginPath(); ctx.moveTo(cx+nx*5, cy+ny*5); ctx.lineTo(cx-nx*5, cy-ny*5); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(A.x*w,A.y*h); ctx.lineTo(sm.x,sm.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(B.x*w,B.y*h); ctx.lineTo(sm.x,sm.y); ctx.stroke();
  }
}

// ===== anatomical muscle overlay =====
// Muscles are drawn as longitudinal fusiform strips that sit on the
// anatomically correct side of each limb. Side (front/back/inner/outer)
// is resolved from the 3D world landmarks returned by the server, so the
// overlay works for upright, folded and inverted poses.
const REST = 0.16;

// map asanas.json muscle `id` -> frontend anatomical muscle ids
const ID_MAP = {
  hamstrings: ['hamstrings'],
  // trapezius co-activates with the shoulder (deltoid) in every arm-loaded
  // or weight-bearing pose, so it follows the deltoid level. This keeps the
  // traps overlay meaningful even though the DB doesn't store a separate
  // `traps` muscle entry.
  deltoids: ['deltoid', 'traps'],
  triceps: ['triceps'],
  biceps: ['biceps'],
  spinal: ['spinal'],
  calves: ['calves'],
  quads_stand: ['quads'], quads: ['quads'], quads_front: ['quads'], hip_flexors: ['quads'],
  glutes: ['glutes'], glutes_back: ['glutes'],
  obliques: ['obliques'], core: ['rectus', 'obliques'],
  pectorals: ['pectoral'], pecs: ['pectoral'], chest: ['pectoral'],
  trapezius: ['traps'],
  forearms: ['forearm'],
};

const MUSCLE_MAP = [
  {id:'deltoid',   seg:[12,14], side:'both', face:'outer', width:0.26},
  {id:'biceps',    seg:[12,14], side:'both', face:'front', width:0.18},
  {id:'triceps',   seg:[12,14], side:'both', face:'back',  width:0.18},
  {id:'forearm',   seg:[14,16], side:'both', face:'front', width:0.15},
  {id:'obliques',  seg:[12,24], side:'both', face:'outer', width:0.18},
  {id:'glutes',    seg:[24,26], side:'both', face:'back',  width:0.28},
  {id:'quads',     seg:[24,26], side:'both', face:'front', width:0.20},
  {id:'hamstrings',seg:[24,26], side:'both', face:'back',  width:0.18},
  {id:'calves',    seg:[26,28], side:'both', face:'back',  width:0.18},
];

function lerpPt(a,b,t){ return {x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t}; }
function vec3(a,b){ return {x:b.x-a.x, y:b.y-a.y, z:b.z-a.z}; }
function len3(v){ return Math.hypot(v.x,v.y,v.z)||1; }
function norm3(v){ const l=len3(v); return {x:v.x/l, y:v.y/l, z:v.z/l}; }
function dot3(a,b){ return a.x*b.x+a.y*b.y+a.z*b.z; }
function lerp3(a,b,t){ return {x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, z:a.z+(b.z-a.z)*t}; }

function torsoFront3D(world){
  const hip = lerp3(world[23], world[24], 0.5);
  const nose = world[0];
  if (!hip || !nose || nose.v < 0.3) return null;
  return norm3(vec3(hip, nose));
}
function torsoCenter3D(world){
  const shoulder = lerp3(world[11], world[12], 0.5);
  const hip = lerp3(world[23], world[24], 0.5);
  if (!shoulder || !hip) return null;
  return lerp3(shoulder, hip, 0.5);
}

// 2D torso-front direction (image pixels): from torso center toward the nose.
// Used for special muscles (trapezius) where the world normal is unreliable.
function torsoFront2D(landmarks){
  const A = landmarks[11], B = landmarks[12], C = landmarks[23], D = landmarks[24];
  if (!A || !B || !C || !D) return null;
  const cx = ((A.x+B.x)/2 + (C.x+D.x)/2) * 0.5 * W;
  const cy = ((A.y+B.y)/2 + (C.y+D.y)/2) * 0.5 * H;
  const nose = landmarks[0];
  if (!nose || nose.v < 0.3) return null;
  const fx = nose.x*W - cx, fy = nose.y*H - cy;
  const fl = Math.hypot(fx, fy);
  if (fl < 0.01 * Math.hypot(W, H)) return null;
  return {x: fx/fl, y: fy/fl};
}

// Resolve a 2D unit normal (image pixel space) from the bone toward the
// requested anatomical face. Uses 3D world landmarks for stability.
function limbNormal2D(pa, pb, wa, wb, world, face){
  if (!wa || !wb || !world) return null;
  const d = vec3(wa, wb);
  const du = norm3(d);
  let n3 = null;
  if (face === 'front' || face === 'back'){
    const f = torsoFront3D(world);
    if (!f) return null;
    const fd = dot3(f, du);
    const perp = {x: f.x - fd*du.x, y: f.y - fd*du.y, z: f.z - fd*du.z};
    const pl = len3(perp);
    if (pl < 0.05) return null;               // front direction parallel to limb
    n3 = norm3(perp);
    if (face === 'back') n3 = {x:-n3.x, y:-n3.y, z:-n3.z};
  } else if (face === 'inner' || face === 'outer'){
    const tc = torsoCenter3D(world);
    if (!tc) return null;
    const mid = lerp3(wa, wb, 0.5);
    const toTorso = vec3(mid, tc);
    const td = dot3(toTorso, du);
    const perp = {x: toTorso.x - td*du.x, y: toTorso.y - td*du.y, z: toTorso.z - td*du.z};
    const pl = len3(perp);
    if (pl < 0.001) return null;
    n3 = norm3(perp);
    if (face === 'outer') n3 = {x:-n3.x, y:-n3.y, z:-n3.z};
  }
  if (!n3) return null;
  // World y is up; image y is down -> flip y for projection.
  const nx = n3.x, ny = -n3.y, nz = n3.z;
  const xyLen = Math.hypot(nx, ny);
  // If the normal is mostly along the camera axis, the front/back side is
  // not meaningfully visible in 2D -> fall back to outer/inner instead.
  if (xyLen < 0.15 || Math.abs(nz) > xyLen) return null;
  return {nx: nx/xyLen, ny: ny/xyLen};
}

function drawFusiform(pa, pb, n, widthFactor, lvl){
  const dx = pb.x - pa.x, dy = pb.y - pa.y;
  const len = Math.hypot(dx, dy) || 1;
  const maxW = widthFactor * len;
  if (maxW < 4) return;
  const endW = maxW * 0.12;
  const belly = lerpPt(pa, pb, 0.5);
  const col = heatRGB(lvl);
  const alpha = 0.45 + 0.40 * lvl;
  ctx.save();
  ctx.globalAlpha = alpha;
  // Muscle belly (half-lens on the surface side)
  ctx.beginPath();
  ctx.moveTo(pa.x + n.nx*endW, pa.y + n.ny*endW);
  ctx.quadraticCurveTo(belly.x + n.nx*maxW, belly.y + n.ny*maxW,
                       pb.x + n.nx*endW, pb.y + n.ny*endW);
  ctx.lineTo(pb.x, pb.y); ctx.lineTo(pa.x, pa.y);
  ctx.closePath();
  const mid = [Math.min(255,col[0]+35), Math.min(255,col[1]+30), Math.min(255,col[2]+30)];
  const grad = ctx.createLinearGradient(pa.x, pa.y, belly.x + n.nx*maxW, belly.y + n.ny*maxW);
  grad.addColorStop(0, `rgb(${col[0]},${col[1]},${col[2]})`);
  grad.addColorStop(0.55, `rgb(${mid[0]},${mid[1]},${mid[2]})`);
  grad.addColorStop(1, `rgb(${col[0]},${col[1]},${col[2]})`);
  ctx.fillStyle = grad;
  ctx.strokeStyle = `rgba(${Math.max(0,col[0]-40)},${Math.max(0,col[1]-40)},${Math.max(0,col[2]-40)},0.9)`;
  ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
  ctx.fill(); ctx.stroke();
  // Longitudinal fibers (parallel to the bone, from bone to outer surface)
  ctx.lineWidth = 1.1;
  ctx.strokeStyle = 'rgba(255,242,242,0.38)';
  ctx.globalAlpha = alpha * 0.75;
  const nF = 5;
  for (let i = 0; i < nF; i++){
    const f = i / (nF - 1);                   // 0 = on bone, 1 = outer edge
    const startOff = f * endW;
    const midOff = f * maxW;
    const endOff = f * endW;
    ctx.beginPath();
    ctx.moveTo(pa.x + n.nx*startOff, pa.y + n.ny*startOff);
    ctx.quadraticCurveTo(belly.x + n.nx*midOff, belly.y + n.ny*midOff,
                         pb.x + n.nx*endOff, pb.y + n.ny*endOff);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBelly(pa, pb, wa, wb, m, lvl, worldLandmarks){
  let n = limbNormal2D(pa, pb, wa, wb, worldLandmarks, m.face);
  if (!n && (m.face === 'front' || m.face === 'back')){
    n = limbNormal2D(pa, pb, wa, wb, worldLandmarks, 'outer');
  }
  if (!n) return;
  drawFusiform(pa, pb, n, m.width, lvl);
}

function drawSpecialMuscles(landmarks, worldLandmarks, fbMap){
  if (!worldLandmarks) return;
  const P = i => landmarks[i] ? {x:landmarks[i].x*W, y:landmarks[i].y*H, v:landmarks[i].v} : null;
  const W3 = i => worldLandmarks[i] || null;
  const A = landmarks[11], B = landmarks[12], C = landmarks[23], D = landmarks[24];
  if (!A || !B || !C || !D) return;
  // Skip torso muscles when the core landmarks are barely visible — the
  // geometry would be meaningless (MediaPipe guessing through an occlusion).
  // The limb muscles already guard on visibility inside drawMuscles().
  if ((A.v !== undefined && A.v < 0.3) || (B.v !== undefined && B.v < 0.3) ||
      (C.v !== undefined && C.v < 0.3) || (D.v !== undefined && D.v < 0.3)) return;
  const wShMid = lerp3(W3(11), W3(12), 0.5), wHipMid = lerp3(W3(23), W3(24), 0.5);
  if (!wShMid || !wHipMid) return;
  const shMid = lerpPt(P(11), P(12), 0.5), hipMid = lerpPt(P(23), P(24), 0.5);
  const chest = lerpPt(shMid, hipMid, 0.32);
  const wChest = lerp3(wShMid, wHipMid, 0.32);
  // Fallback neck point (used only if nose is missing): keep it close to the
  // shoulders so it can never drift onto the face in inverted poses.
  const neck = {x: shMid.x, y: shMid.y - (hipMid.y-shMid.y)*0.30};
  const wNeck = {x: wShMid.x, y: wShMid.y - (wHipMid.y-wShMid.y)*0.30, z: wShMid.z};
  // Pectorals: shoulder -> chest center, front face
  for (const s of [11,12]){
    const sh = P(s); const wSh = W3(s);
    if (!sh || !wSh) continue;
    drawBelly(sh, chest, wSh, wChest, {face:'front', width:0.30}, fbMap['pectoral']!=null?fbMap['pectoral']:REST, worldLandmarks);
  }
  // Rectus abdominis: vertical segments on front of torso
  for (const s of [11,12]){
    const top = P(s), bot = P(s===11?23:24);
    const wTop = W3(s===11?11:12), wBot = W3(s===11?23:24);
    if (!top || !bot || !wTop || !wBot) continue;
    const lvl = fbMap['rectus']!=null?fbMap['rectus']:REST;
    for (let k = 0; k < 3; k++){
      const t0 = 0.12+k*0.28, t1 = 0.32+k*0.28;
      const a = lerpPt(top, bot, t0), b = lerpPt(top, bot, t1);
      const wa = lerp3(wTop, wBot, t0), wb = lerp3(wTop, wBot, t1);
      drawBelly(a, b, wa, wb, {face:'front', width:0.12}, lvl, worldLandmarks);
    }
  }
  // Trapezius: shoulder -> upper neck (between shoulder and nose), back face.
  // Anchor the endpoint to the nose so it stays on the neck and never lands
  // on the face in inverted poses like downward dog.
  const nose = P(0), wNose = W3(0);
  const front = torsoFront2D(landmarks);
  for (const s of [11,12]){
    const sh = P(s), wSh = W3(s);
    if (!sh || !wSh) continue;
    const neckPt = (nose && nose.v > 0.3) ? lerpPt(sh, nose, 0.5) : neck;
    let dx = neckPt.x - sh.x, dy = neckPt.y - sh.y;
    let nx = -dy, ny = dx;
    const nl = Math.hypot(nx, ny) || 1; nx /= nl; ny /= nl;
    if (front){ const dotF = nx*front.x + ny*front.y; if (dotF > 0){ nx = -nx; ny = -ny; } }
    drawFusiform(sh, neckPt, {nx, ny}, 0.20, fbMap['traps']!=null?fbMap['traps']:REST);
  }
  // Erector spinae: flanking the spine, back face
  const sdx = hipMid.x-shMid.x, sdy = hipMid.y-shMid.y, slen = Math.hypot(sdx,sdy)||1, snx = -sdy/slen, sny = sdx/slen;
  const lvlE = fbMap['spinal']!=null?fbMap['spinal']:REST;
  for (const side of [-1,1]){
    const a = lerpPt(shMid, hipMid, 0.15), b = lerpPt(shMid, hipMid, 0.85);
    const wa = lerp3(wShMid, wHipMid, 0.15), wb = lerp3(wShMid, wHipMid, 0.85);
    const off = side * slen * 0.05;
    drawBelly({x:a.x+snx*off, y:a.y+sny*off},
              {x:b.x+snx*off, y:b.y+sny*off},
              wa, wb, {face:'back', width:0.08}, lvlE, worldLandmarks);
  }
}

function drawMuscles(landmarks, worldLandmarks, w, h, feedback){
  W = w; H = h;
  const fbMap = {};
  if (feedback && feedback.muscles)
    for (const m of feedback.muscles){
      const fids = ID_MAP[m.id] || [];
      for (const fid of fids) fbMap[fid] = m.live != null ? m.live : m.level;
    }
  for (const m of MUSCLE_MAP){
    const segs = m.side === 'both' ? [m.seg, [MIRROR[m.seg[0]], MIRROR[m.seg[1]]]] : [m.seg];
    for (const sg of segs){
      const pa = landmarks[sg[0]], pb = landmarks[sg[1]];
      if (!pa || !pb) continue;
      if ((pa.v !== undefined && pa.v < 0.5) || (pb.v !== undefined && pb.v < 0.5)) continue;
      const wa = worldLandmarks ? worldLandmarks[sg[0]] : null;
      const wb = worldLandmarks ? worldLandmarks[sg[1]] : null;
      const lvl = fbMap[m.id] != null ? fbMap[m.id] : REST;
      drawBelly({x:pa.x*w, y:pa.y*h}, {x:pb.x*w, y:pb.y*h}, wa, wb, m, lvl, worldLandmarks);
    }
  }
  drawSpecialMuscles(landmarks, worldLandmarks, fbMap);
}

function heatRGB(l){ // 0 cool (blue) -> 1 hot (red); shared by overlay + bars
  l = Math.max(0, Math.min(1, l));
  let c;
  if (l < 0.5){
    const t = l/0.5;
    c = [59 + (245-59)*t, 130 + (158-130)*t, 246 + (11-246)*t];
  } else {
    const t = (l-0.5)/0.5;
    c = [245 + (239-245)*t, 158 + (68-158)*t, 11 + (68-11)*t];
  }
  return [c[0]|0, c[1]|0, c[2]|0];
}
function heat(l){ const c = heatRGB(l); return `rgb(${c[0]},${c[1]},${c[2]})`; }

function drawHands(landmarks, w, h, handedness){
  if (!landmarks || !landmarks.length) return;
  ctx.strokeStyle = '#f7b955'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  for (const [a, b] of HAND_CONNECTIONS){
    const pa = landmarks[a], pb = landmarks[b];
    if (!pa || !pb) continue;
    ctx.beginPath(); ctx.moveTo(pa.x * w, pa.y * h); ctx.lineTo(pb.x * w, pb.y * h); ctx.stroke();
  }
  for (let i = 0; i < landmarks.length; i++){
    const p = landmarks[i]; const x = p.x * w, y = p.y * h;
    ctx.beginPath(); ctx.arc(x, y, i === 0 ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd479'; ctx.fill();
  }
  const wrist = landmarks[0];
  if (wrist){ ctx.fillStyle = '#f7b955'; ctx.font = '12px system-ui, sans-serif';
    ctx.fillText(handedness || '?', wrist.x * w + 6, wrist.y * h - 6); }
}

// Build the panel skeleton ONCE per asana (fixed row count) so the panel
// height never jumps during streaming. Values are then updated in place.
let fbSkeletonKey = null, fbRuleRows = [], fbMuscleRows = [];

function buildFeedbackSkeleton(fb){
  fbBody.innerHTML = '';
  const score = document.createElement('div'); score.className = 'score'; score.id = 'fbScore';
  const asana = document.createElement('div'); asana.className = 'val'; asana.id = 'fbAsana';
  fbBody.appendChild(score); fbBody.appendChild(asana);
  // low-score tip banner (Item 5) — shown only when overall match < 60%
  const tip = document.createElement('div'); tip.id = 'fbTip'; tip.className = 'lowtip';
  tip.style.display = 'none';
  tip.style.margin = '6px 0 4px';
  tip.style.padding = '6px 10px';
  tip.style.borderRadius = '8px';
  tip.style.background = 'rgba(210,153,34,0.15)';
  tip.style.border = '1px solid rgba(210,153,34,0.5)';
  tip.style.color = '#d29922';
  tip.style.fontSize = '13px';
  tip.style.lineHeight = '1.4';
  fbBody.appendChild(tip);
  fbRuleRows = [];
  for (const it of fb.items){
    const row = document.createElement('div'); row.className = 'rule';
    row.innerHTML = `<span class="lbl">${it.label}</span><span class="badge" data-badge></span><br>`
      + `<span class="val" data-val></span>`
      + `<div class="corr" data-corr></div>`;   // always present -> uniform height
    fbBody.appendChild(row); fbRuleRows.push(row);
  }
  const h = document.createElement('h2'); h.style.marginTop = '12px';
  h.textContent = '肌肉张紧（目标发力）'; fbBody.appendChild(h);
  fbMuscleRows = [];
  for (const m of fb.muscles){
    const row = document.createElement('div'); row.className = 'muscle-row';
    row.innerHTML = `<span style="width:110px">${m.name_zh}</span>`
      + `<span class="bar"><i data-bar></i></span>`
      + `<span class="val" data-pct></span>`;
    fbBody.appendChild(row); fbMuscleRows.push(row);
  }
}

function updateFeedback(fb){
  const s = document.getElementById('fbScore');
  s.textContent = `${fb.score}`;
  s.innerHTML = `${fb.score}<span style="font-size:14px;color:#8b949e">/100 匹配度</span>`;
  s.style.color = fb.score >= 80 ? '#3fb950' : fb.score >= 50 ? '#d29922' : '#f85149';
  const fbAsana = document.getElementById('fbAsana');
  if (fb.asana_id === '__unknown__') fbAsana.textContent = '未识别';
  else {
    const meta = ASANA_MAP[fb.asana_id];
    fbAsana.textContent = meta ? `${meta.name_zh} · ${meta.name_en}` : fb.asana_id;
  }
  const tip = document.getElementById('fbTip');
  if (tip){
    if (fb.low_score_tip){ tip.style.display = 'block'; tip.textContent = '💡 ' + fb.low_score_tip; }
    else tip.style.display = 'none';
  }
  fb.items.forEach((it, i) => {
    const row = fbRuleRows[i]; if (!row) return;
    const badge = row.querySelector('[data-badge]');
    const sym = it.status === 'ok' ? '✓' : it.status === 'warn' ? '~' : '✗';
    badge.textContent = `${sym} ${it.status}`;
    badge.className = `badge ${it.status}`;
    const baseUnit = it.unit != null && it.unit !== '' ? it.unit : (it.id === 'pelvis_level' ? 'cm' : '°');
    // vertical_order / image_vertical_order embed their unit inside `value`
    // (e.g. "↓32cm" / "↓40%"); reuse that unit for the deviation readout so
    // it is not shown as a bare number.
    const devUnit = /cm/.test(String(it.value)) ? 'cm' : /%/.test(String(it.value)) ? '%' : baseUnit;
    row.querySelector('[data-val]').textContent =
      `实测 ${it.value}${baseUnit} · 目标 ${it.target}${baseUnit} (偏差 ${it.deviation>0?'+':''}${it.deviation}${devUnit})`;
    const corr = row.querySelector('[data-corr]');
    corr.textContent = it.status === 'ok' ? '✓ 保持当前位置' : `纠正：${it.correction}`;
  });
  fb.muscles.forEach((m, i) => {
    const row = fbMuscleRows[i]; if (!row) return;
    const pct = Math.round(m.live * 100);
    const bar = row.querySelector('[data-bar]');
    bar.style.width = pct + '%';
    bar.style.background = heat(m.live);   // same scale as the canvas overlay
    row.querySelector('[data-pct]').textContent = pct + '%';
  });
}

let lastFb = 0;
function renderFeedback(fb){
  const key = `${fb.asana_id}|${fb.items.length}|${fb.muscles.length}`;
  if (key !== fbSkeletonKey){ buildFeedbackSkeleton(fb); fbSkeletonKey = key; lastFb = 0; }
  const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  if (now - lastFb < 160) return;   // throttle value updates to ~6 Hz
  lastFb = now;
  updateFeedback(fb);
}

document.getElementById('btnCamera').onclick = () => startClientCamera();
document.getElementById('btnStop').onclick = () => {
  stopClientCamera();
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'stop'}));
  setStatus('已发送停止指令。');
};
document.getElementById('btnSnap').onclick = () => {
  if (!canvas.width){ setStatus('还没有可保存的画面，请先启动摄像头或上传。'); return; }
  canvas.toBlob((blob) => {
    if (!blob){ setStatus('截图失败。'); return; }
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g, '-');
    a.href = URL.createObjectURL(blob);
    a.download = `yoga_${currentAsana || 'pose'}_${ts}.png`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    setStatus('已保存截图。');
  }, 'image/png');
};
document.getElementById('fileImage').onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = () => startCmd({source:'image', data: r.result}); r.readAsDataURL(f);
};
document.getElementById('fileVideo').onchange = async (e) => {
  const f = e.target.files[0]; if (!f) return; setStatus('上传中…');
  try {
    const fd = new FormData(); fd.append('file', f);
    const res = await fetch(BASE + '/api/upload', {method:'POST', body:fd});
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(txt || `HTTP ${res.status}`);
    }
    const j = await res.json();
    startCmd({source: j.kind, path: j.path});
  } catch (err) {
    setStatus('上传失败: ' + err.message);
  }
  e.target.value = '';
};

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const POSE_CONNECTIONS = window.POSE_CONNECTIONS || [];
const canvas = document.getElementById('view3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio || 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 100);
camera.position.set(0, -0.2, 2.4);

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dl = new THREE.DirectionalLight(0xffffff, 0.9);
dl.position.set(1, 1, 2);
scene.add(dl);

function makeSkeleton(color, opacity){
  const g = new THREE.Group();
  const jointGeo = new THREE.SphereGeometry(0.028, 12, 12);
  const jointMat = new THREE.MeshStandardMaterial({ color, transparent: opacity < 1, opacity });
  const joints = [];
  for (let i = 0; i < 33; i++){
    const m = new THREE.Mesh(jointGeo, jointMat);
    g.add(m); joints.push(m);
  }
  const linePos = new Float32Array(POSE_CONNECTIONS.length * 2 * 3);
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
  const lineMat = new THREE.LineBasicMaterial({ color, transparent: opacity < 1, opacity });
  const lines = new THREE.LineSegments(lineGeo, lineMat);
  g.add(lines);
  g.userData = { joints, lineGeo, linePos };
  return g;
}

const skel = makeSkeleton(0x58a6ff, 1.0);
const ghost = makeSkeleton(0xffa657, 0.35);
ghost.visible = false;
scene.add(skel); scene.add(ghost);

// ---- 3D muscle layer (mirrors 2D MUSCLE_MAP + special muscles) ----
// Reuses the EXACT same per-muscle level source as the 2D overlay:
// msg.feedback.muscles [{id, level, live}], mapped via ID_MAP.
const REST3D = 0.16;
const ID_MAP3D = {
  hamstrings: ['hamstrings'], deltoids: ['deltoid', 'traps'], triceps: ['triceps'],
  biceps: ['biceps'], spinal: ['spinal'], calves: ['calves'], quads_stand: ['quads'],
  quads: ['quads'], quads_front: ['quads'], hip_flexors: ['quads'], glutes: ['glutes'],
  glutes_back: ['glutes'], obliques: ['obliques'], core: ['rectus', 'obliques'],
  pectorals: ['pectoral'], pecs: ['pectoral'], chest: ['pectoral'], trapezius: ['traps'],
  forearms: ['forearm'],
};
const MUSCLE_MAP3D = [
  {id:'deltoid', seg:[12,14], side:'both', face:'outer', width:0.26},
  {id:'biceps', seg:[12,14], side:'both', face:'front', width:0.18},
  {id:'triceps', seg:[12,14], side:'both', face:'back', width:0.18},
  {id:'forearm', seg:[14,16], side:'both', face:'front', width:0.15},
  {id:'obliques', seg:[12,24], side:'both', face:'outer', width:0.18},
  {id:'glutes', seg:[24,26], side:'both', face:'back', width:0.28},
  {id:'quads', seg:[24,26], side:'both', face:'front', width:0.20},
  {id:'hamstrings', seg:[24,26], side:'both', face:'back', width:0.18},
  {id:'calves', seg:[26,28], side:'both', face:'back', width:0.18},
];
const MIRROR3D = {11:12,12:11,13:14,14:13,15:16,16:15,23:24,24:23,25:26,26:25,27:28,28:27};
function heatRGB3(l){
  l = Math.max(0, Math.min(1, l));
  let c;
  if (l < 0.5){ const t = l/0.5; c = [59+(245-59)*t, 130+(158-130)*t, 246+(11-246)*t]; }
  else { const t = (l-0.5)/0.5; c = [245+(239-245)*t, 158+(68-158)*t, 11+(68-11)*t]; }
  return [c[0]|0, c[1]|0, c[2]|0];
}
const V3 = {
  sub:(a,b)=>({x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}),
  len:(v)=>Math.hypot(v.x,v.y,v.z)||1,
  norm:(v)=>{ const l=Math.hypot(v.x,v.y,v.z)||1; return {x:v.x/l, y:v.y/l, z:v.z/l}; },
  dot:(a,b)=>a.x*b.x+a.y*b.y+a.z*b.z,
  lerp:(a,b,t)=>({x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, z:a.z+(b.z-a.z)*t}),
  dist:(a,b)=>Math.hypot(a.x-b.x, a.y-b.y, a.z-b.z),
  three:(p)=>({x:p.x, y:-p.y, z:-p.z}),
};
function frontDirWorld(world){
  const hip = V3.lerp(world[23], world[24], 0.5);
  const nose = world[0];
  if (!hip || !nose || nose.v < 0.3) return {x:0, y:0, z:1};
  return V3.norm(V3.sub(hip, nose));
}
function centerDirWorld(world){
  const sh = V3.lerp(world[11], world[12], 0.5);
  const hip = V3.lerp(world[23], world[24], 0.5);
  return V3.lerp(sh, hip, 0.5);
}
function limbNormalWorld(pa, pb, face, front, center){
  const du = V3.norm(V3.sub(pa, pb));
  let n = null;
  if (face === 'front' || face === 'back'){
    const fd = V3.dot(front, du);
    const perp = {x:front.x-fd*du.x, y:front.y-fd*du.y, z:front.z-fd*du.z};
    if (V3.len(perp) < 0.05) return null;
    n = V3.norm(perp);
    if (face === 'back') n = {x:-n.x, y:-n.y, z:-n.z};
  } else {
    const mid = V3.lerp(pa, pb, 0.5);
    const toT = V3.sub(center, mid);
    const td = V3.dot(toT, du);
    const perp = {x:toT.x-td*du.x, y:toT.y-td*du.y, z:toT.z-td*du.z};
    if (V3.len(perp) < 0.001) return null;
    n = V3.norm(perp);
    if (face === 'outer') n = {x:-n.x, y:-n.y, z:-n.z};
  }
  return n;
}
// Build the fixed list of muscle render units (one capsule mesh each).
const MUSCLE_UNITS3D = [];
(function(){
  for (const m of MUSCLE_MAP3D){
    const segs = m.side === 'both'
      ? [[m.seg[0], m.seg[1]], [MIRROR3D[m.seg[0]], MIRROR3D[m.seg[1]]]]
      : [[m.seg[0], m.seg[1]]];
    for (const sg of segs) MUSCLE_UNITS3D.push({id:m.id, kind:'limb', seg:sg, face:m.face, width:m.width});
  }
  MUSCLE_UNITS3D.push({id:'pectoral', kind:'pectoral', side:11, width:0.30});
  MUSCLE_UNITS3D.push({id:'pectoral', kind:'pectoral', side:12, width:0.30});
  for (const s of [11,12]) for (let k=0; k<3; k++)
    MUSCLE_UNITS3D.push({id:'rectus', kind:'rectus', side:s, k, width:0.12});
  MUSCLE_UNITS3D.push({id:'traps', kind:'traps', side:11, width:0.20});
  MUSCLE_UNITS3D.push({id:'traps', kind:'traps', side:12, width:0.20});
  MUSCLE_UNITS3D.push({id:'spinal', kind:'spinal', side:-1, width:0.08});
  MUSCLE_UNITS3D.push({id:'spinal', kind:'spinal', side:1, width:0.08});
})();
const MUSCLE_3D_WIDTH_SCALE = 0.35; // 3D 胶囊视觉上要比 2D 表面 bulge 更细
const muscleGeo = new THREE.CapsuleGeometry(1, 1, 4, 8);
const UP_Y = new THREE.Vector3(0, 1, 0);
const muscleGroup = new THREE.Group();
scene.add(muscleGroup);
for (const u of MUSCLE_UNITS3D){
  const mat = new THREE.MeshBasicMaterial({ color:0x3b82f6, transparent:true, opacity:0.45 });
  const mesh = new THREE.Mesh(muscleGeo, mat);
  mesh.visible = false;
  muscleGroup.add(mesh);
  u.mesh = mesh;
}
function unitWorldEndpoints(u, world, frontW, centerW, shMidW, hipMidW){
  if (u.kind === 'limb') return [world[u.seg[0]], world[u.seg[1]]];
  if (u.kind === 'pectoral') return [world[u.side], V3.lerp(shMidW, hipMidW, 0.32)];
  if (u.kind === 'rectus'){
    const top = world[u.side], bot = world[u.side === 11 ? 23 : 24];
    const t0 = 0.12 + u.k*0.28, t1 = 0.32 + u.k*0.28;
    return [V3.lerp(top, bot, t0), V3.lerp(top, bot, t1)];
  }
  if (u.kind === 'traps'){
    const sh = world[u.side], nose = world[0];
    const pb = (nose && nose.v > 0.3) ? V3.lerp(sh, nose, 0.5)
      : {x:shMidW.x, y:shMidW.y - (hipMidW.y - shMidW.y)*0.30, z:shMidW.z};
    return [sh, pb];
  }
  if (u.kind === 'spinal'){
    const aW = V3.lerp(shMidW, hipMidW, 0.15), bW = V3.lerp(shMidW, hipMidW, 0.85);
    const off = u.side * 0.04;
    return [{x:aW.x+off, y:aW.y, z:aW.z}, {x:bW.x+off, y:bW.y, z:bW.z}];
  }
  return null;
}
function unitLevel(id, fbMap){
  const ids = ID_MAP3D[id] || [id];
  for (const fid of ids) if (fbMap[fid] != null) return fbMap[fid];
  return REST3D;
}
const _dir = new THREE.Vector3();
function updateMuscles(feedback, world){
  if (!world || world.length < 33){ for (const u of MUSCLE_UNITS3D) u.mesh.visible = false; return; }
  const fbMap = {};
  if (feedback && feedback.muscles)
    for (const m of feedback.muscles){
      const fids = ID_MAP3D[m.id] || [];
      const val = m.live != null ? m.live : m.level;
      for (const fid of fids) fbMap[fid] = val;
    }
  const frontW = frontDirWorld(world), centerW = centerDirWorld(world);
  const shMidW = V3.lerp(world[11], world[12], 0.5);
  const hipMidW = V3.lerp(world[23], world[24], 0.5);
  for (const u of MUSCLE_UNITS3D){
    const ends = unitWorldEndpoints(u, world, frontW, centerW, shMidW, hipMidW);
    if (!ends) { u.mesh.visible = false; continue; }
    const [paW, pbW] = ends;
    if (!paW || !pbW) { u.mesh.visible = false; continue; }
    const face = u.kind === 'limb' ? u.face
      : (u.kind === 'pectoral' || u.kind === 'rectus') ? 'front' : 'back';
    const nW = limbNormalWorld(paW, pbW, face, frontW, centerW);
    const pa3 = V3.three(paW), pb3 = V3.three(pbW);
    const boneLen = V3.dist(pa3, pb3) || 0.001;
    const mid3 = V3.lerp(pa3, pb3, 0.5);
    const n3 = nW ? {x:nW.x, y:-nW.y, z:-nW.z} : {x:0, y:0, z:0.5};
    // 3D muscle = thin fusiform capsule sitting just outside the bone surface.
    const radius = Math.max(0.004, u.width * boneLen * MUSCLE_3D_WIDTH_SCALE * 0.45); // ~0.12 * width * boneLen
    const len = Math.max(boneLen * 0.55, boneLen * 0.92 - 2 * radius); // total capsule height <= boneLen
    const offset = Math.max(radius * 1.3, u.width * boneLen * 0.08); // inner surface near bone center
    const center = {x: mid3.x + n3.x*offset, y: mid3.y + n3.y*offset, z: mid3.z + n3.z*offset};
    u.mesh.visible = true;
    u.mesh.position.set(center.x, center.y, center.z);
    _dir.set(pb3.x-pa3.x, pb3.y-pa3.y, pb3.z-pa3.z).normalize();
    u.mesh.quaternion.setFromUnitVectors(UP_Y, _dir);
    u.mesh.scale.set(radius, len, radius);
    const lvl = unitLevel(u.id, fbMap);
    const c = heatRGB3(lvl);
    u.mesh.material.color.setRGB(c[0]/255, c[1]/255, c[2]/255);
    u.mesh.material.opacity = 0.35 + 0.40 * Math.min(1, lvl);
  }
}

function setSkeleton(g, world){
  if (!world || world.length < 33) return;
  const { joints, lineGeo, linePos } = g.userData;
  for (let i = 0; i < 33; i++){
    const p = world[i];
    joints[i].position.set(p.x, -p.y, -p.z);
  }
  let k = 0;
  for (const c of POSE_CONNECTIONS){
    const a = world[c[0]], b = world[c[1]];
    linePos[k++] = a.x; linePos[k++] = -a.y; linePos[k++] = -a.z;
    linePos[k++] = b.x; linePos[k++] = -b.y; linePos[k++] = -b.z;
  }
  lineGeo.attributes.position.needsUpdate = true;
}

window.Avatar3D = {
  update(world, feedback){ setSkeleton(skel, world); updateMuscles(feedback, world); },
  setGhost(world){ if (world && world.length >= 33){ setSkeleton(ghost, world); ghost.visible = true; } else ghost.visible = false; },
  clearGhost(){ ghost.visible = false; },
  toggleMuscles(on){ muscleGroup.visible = on; },
  // Read-only introspection for automated tests / debugging.
  getMuscleState(){ return MUSCLE_UNITS3D.map(u => ({id:u.id, kind:u.kind, visible:u.mesh.visible, scale:[u.mesh.scale.x, u.mesh.scale.y, u.mesh.scale.z], color:[u.mesh.material.color.r, u.mesh.material.color.g, u.mesh.material.color.b], opacity:u.mesh.material.opacity})); }
};

const _chkM = document.getElementById('chkMuscles3d');
if (_chkM) _chkM.addEventListener('change', e => { if (window.Avatar3D) window.Avatar3D.toggleMuscles(e.target.checked); });

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0, 0);

function resize(){
  const w = canvas.clientWidth || 360, h = canvas.clientHeight || 480;
  renderer.setSize(w, h, false);
  camera.aspect = w / h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
resize(); animate();
</script>
</body>
