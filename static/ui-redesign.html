<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yoga Flow - 智能瑜伽助手</title>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #1a1f2e;
    --surface-2: #232a3b;
    --border: #2d3548;
    --text: #e8edf5;
    --text-dim: #8892a4;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --success: #00cec9;
    --warning: #fdcb6e;
    --danger: #ff7675;
    --gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--gradient);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .status-bar {
    padding: 8px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--danger);
  }

  .status-dot.connected {
    background: var(--success);
  }

  /* ── Buttons ── */
  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--gradient);
    color: white;
    box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
  }

  .btn-secondary {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .btn-success {
    background: var(--success);
    color: white;
  }

  .btn-danger {
    background: var(--danger);
    color: white;
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    padding: 0;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Main Layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
    padding: 20px;
    max-width: 1600px;
    margin: 0 auto;
  }

  @media (max-width: 1200px) {
    .main {
      grid-template-columns: 1fr;
    }
  }

  /* ── Video Panel ── */
  .video-panel {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .video-container {
    position: relative;
    aspect-ratio: 16/9;
    background: #000;
  }

  #videoCanvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .video-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
  }

  .pose-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(10px);
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .pose-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .pose-sanskrit {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }

  .score-ring {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 80px;
    height: 80px;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring circle {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
  }

  .score-ring .bg {
    stroke: var(--border);
  }

  .score-ring .progress {
    stroke: var(--success);
    transition: stroke-dashoffset 0.3s ease;
  }

  .score-ring .score-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    font-weight: 700;
  }

  .video-controls {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
  }

  .control-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* ── Sequence Progress ── */
  .sequence-bar {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
  }

  .sequence-step {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.3s ease;
  }

  .sequence-step.completed {
    background: var(--success);
  }

  .sequence-step.current {
    background: var(--accent);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .sequence-info {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
  }

  /* ── Sidebar ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-body {
    padding: 12px 16px;
  }

  /* ── Pose Selector ── */
  .pose-selector {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 36px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
  }

  .search-box input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
  }

  .pose-list {
    max-height: 250px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .pose-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .pose-item:hover {
    background: var(--surface-2);
  }

  .pose-item.active {
    background: var(--accent);
    color: white;
  }

  .pose-item-info {
    display: flex;
    flex-direction: column;
  }

  .pose-item-name {
    font-weight: 500;
    font-size: 13px;
  }

  .pose-item-en {
    font-size: 11px;
    color: var(--text-dim);
  }

  .pose-item.active .pose-item-en {
    color: rgba(255, 255, 255, 0.7);
  }

  .difficulty-badge {
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    background: var(--surface-2);
  }

  .pose-item.active .difficulty-badge {
    background: rgba(255, 255, 255, 0.2);
  }

  /* ── Feedback Panel ── */
  .feedback-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 300px;
    overflow-y: auto;
  }

  .feedback-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px;
    background: var(--surface-2);
    border-radius: 8px;
  }

  .feedback-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .feedback-icon.ok {
    background: rgba(0, 206, 201, 0.2);
  }

  .feedback-icon.warn {
    background: rgba(253, 203, 110, 0.2);
  }

  .feedback-icon.off {
    background: rgba(255, 118, 117, 0.2);
  }

  .feedback-content {
    flex: 1;
    min-width: 0;
  }

  .feedback-title {
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 2px;
  }

  .feedback-detail {
    font-size: 12px;
    color: var(--text-dim);
  }

  .feedback-value {
    font-size: 11px;
    color: var(--accent-light);
    margin-top: 2px;
  }

  /* ── History ── */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface-2);
    border-radius: 6px;
    font-size: 12px;
  }

  .history-time {
    color: var(--text-dim);
    min-width: 50px;
  }

  .history-name {
    flex: 1;
    font-weight: 500;
  }

  .history-score {
    color: var(--success);
    font-weight: 600;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar {
    width: 5px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🧘</div>
    <span class="logo-text">Yoga Flow</span>
  </div>
  <div class="header-actions">
    <label class="btn btn-secondary" style="cursor:pointer">
      📷 上传图片
      <input type="file" id="fileImage" accept="image/*" style="display:none">
    </label>
    <label class="btn btn-secondary" style="cursor:pointer">
      🎬 上传视频
      <input type="file" id="fileVideo" accept="video/*" style="display:none">
    </label>
    <button class="btn btn-primary" id="btnCamera">▶ 启动摄像头</button>
  </div>
</header>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">未连接</span>
</div>

<main class="main">
  <div class="video-panel">
    <div class="video-container">
      <canvas id="videoCanvas" width="640" height="480"></canvas>
      <div class="video-overlay">
        <div class="pose-badge">
          <div class="pose-name" id="poseName">准备就绪</div>
          <div class="pose-sanskrit" id="poseSanskrit"></div>
        </div>
        <div class="score-ring">
          <svg width="80" height="80">
            <circle class="bg" cx="40" cy="40" r="36"></circle>
            <circle class="progress" cx="40" cy="40" r="36" 
                    stroke-dasharray="226" stroke-dashoffset="226" id="scoreCircle"></circle>
          </svg>
          <div class="score-text" id="scoreText">0%</div>
        </div>
      </div>
    </div>
    <div class="sequence-bar" id="sequenceBar">
      <div class="sequence-step" data-step="1"></div>
      <div class="sequence-step" data-step="2"></div>
      <div class="sequence-step" data-step="3"></div>
      <div class="sequence-step" data-step="4"></div>
      <div class="sequence-step" data-step="5"></div>
      <div class="sequence-step" data-step="6"></div>
      <div class="sequence-step" data-step="7"></div>
      <div class="sequence-step" data-step="8"></div>
      <div class="sequence-step" data-step="9"></div>
      <div class="sequence-step" data-step="10"></div>
    </div>
    <div class="sequence-info">
      <span id="sequenceName">序列检测：-</span>
      <span id="sequenceProgress">0/10</span>
    </div>
    <div class="video-controls">
      <div class="control-group">
        <button class="btn btn-secondary btn-icon" id="btnSnap" title="截图">📸</button>
        <button class="btn btn-secondary btn-icon" id="btnFullscreen" title="全屏">⛶</button>
      </div>
      <div class="control-group">
        <label class="chk" style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="chkAuto" style="accent-color:var(--success)"> 🤖 自动识别
        </label>
        <button class="btn btn-danger" id="btnStop">■ 停止</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:8px;font-size:12px;color:#9aa">
      <span>肌肉发力</span>
      <span style="display:inline-block;width:130px;height:10px;border-radius:5px;background:linear-gradient(90deg,#3b82f6,#f59e0b,#ef4444)"></span>
      <span>蓝=拉伸/放松 · 红=收缩/发力（按当前姿势实时计算）</span>
    </div>
  </div>

  <div class="sidebar">
    <div class="card">
      <div class="card-header">
        <span class="card-title">🎯 选择体式</span>
      </div>
      <div class="card-body">
        <div class="pose-selector">
          <div class="search-box">
            <input type="text" placeholder="搜索体式..." id="poseSearch">
          </div>
          <div class="pose-list" id="poseList"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">💬 实时反馈</span>
      </div>
      <div class="card-body">
        <div class="feedback-list" id="feedbackList">
          <div class="feedback-item">
            <div class="feedback-icon ok">✓</div>
            <div class="feedback-content">
              <div class="feedback-title">准备就绪</div>
              <div class="feedback-detail">选择体式或开启自动识别开始练习</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">📋 练习历史</span>
      </div>
      <div class="card-body">
        <div class="history-list" id="historyList">
          <div style="text-align:center; color:var(--text-dim); padding:16px; font-size:12px;">
            暂无记录
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ── Config ──
const WS_HOST = location.host || '127.0.0.1:8000';
const BASE = '';

// ── State ──
let ws = null;
let currentPoseId = null;
let isRunning = false;
let poseHistory = [];
const MAX_HISTORY = 10;
const canvas = document.getElementById('videoCanvas');
const ctx = canvas.getContext('2d');
let ASANA_MAP = {};
let clientCam = null, clientCamRAF = null, clientVideo = null;
let activeStream = null;

// ── Pose Data ──
const POSES = [
  { id: 'mountain', name: '山式', en: 'Mountain Pose', sk: 'Tadasana', diff: 1 },
  { id: 'tree', name: '树式', en: 'Tree Pose', sk: 'Vrksasana', diff: 1 },
  { id: 'warrior1', name: '战士一式', en: 'Warrior I', sk: 'Virabhadrasana I', diff: 2 },
  { id: 'warrior2', name: '战士二式', en: 'Warrior II', sk: 'Virabhadrasana II', diff: 2 },
  { id: 'warrior3', name: '战士三式', en: 'Warrior III', sk: 'Virabhadrasana III', diff: 3 },
  { id: 'triangle', name: '三角式', en: 'Triangle Pose', sk: 'Trikonasana', diff: 2 },
  { id: 'chair', name: '幻椅式', en: 'Chair Pose', sk: 'Utkatasana', diff: 1 },
  { id: 'downward_facing_dog', name: '下犬式', en: 'Downward Dog', sk: 'Adho Mukha Svanasana', diff: 2 },
  { id: 'cobra', name: '眼镜蛇式', en: 'Cobra Pose', sk: 'Bhujangasana', diff: 1 },
  { id: 'bridge', name: '桥式', en: 'Bridge Pose', sk: 'Setu Bandhasana', diff: 2 },
  { id: 'boat', name: '船式', en: 'Boat Pose', sk: 'Navasana', diff: 2 },
  { id: 'plank', name: '平板式', en: 'Plank Pose', sk: 'Phalakasana', diff: 2 },
  { id: 'camel', name: '骆驼式', en: 'Camel Pose', sk: 'Ustrasana', diff: 2 },
  { id: 'salabhasana', name: '蝗虫式', en: 'Locust Pose', sk: 'Salabhasana', diff: 2 },
  { id: 'dhanurasana', name: '弓式', en: 'Bow Pose', sk: 'Dhanurasana', diff: 2 },
  { id: 'chaturanga', name: '四柱支撑', en: 'Chaturanga', sk: 'Chaturanga Dandasana', diff: 3 },
];

// ── Initialize ──
async function init() {
  renderPoseList(POSES);
  setupEventListeners();
  await loadAsanas();
}

// ── Load Asanas from API ──
async function loadAsanas() {
  try {
    const res = await fetch(BASE + '/api/asanas');
    const list = await res.json();
    for (const a of list) {
      ASANA_MAP[a.id] = a;
    }
    console.log(`Loaded ${list.length} asanas`);
  } catch (e) {
    console.error('Failed to load asanas:', e);
  }
}

// ── Render Pose List ──
function renderPoseList(poses) {
  const poseList = document.getElementById('poseList');
  poseList.innerHTML = poses.map(pose => `
    <div class="pose-item" data-id="${pose.id}">
      <div class="pose-item-info">
        <span class="pose-item-name">${pose.name}</span>
        <span class="pose-item-en">${pose.en}</span>
      </div>
      <span class="difficulty-badge">${'★'.repeat(pose.diff)}</span>
    </div>
  `).join('');

  poseList.querySelectorAll('.pose-item').forEach(item => {
    item.addEventListener('click', () => selectPose(item.dataset.id));
  });
}

// ── Select Pose ──
function selectPose(poseId) {
  currentPoseId = poseId;
  
  document.querySelectorAll('.pose-item').forEach(item => {
    item.classList.toggle('active', item.dataset.id === poseId);
  });
  
  const pose = POSES.find(p => p.id === poseId) || ASANA_MAP[poseId];
  if (pose) {
    document.getElementById('poseName').textContent = pose.name_zh || pose.name;
    document.getElementById('poseSanskrit').textContent = pose.name_sanskrit || pose.sk || '';
  }
  
  // Send to server
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'start', asanaId: poseId, source: 'client-camera' }));
  }
}

// ── WebSocket ──
function connect() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  
  ws = new WebSocket(`ws://${WS_HOST}/ws`);
  
  ws.onopen = () => {
    setStatus('已连接', true);
    if (currentPoseId) {
      ws.send(JSON.stringify({ type: 'start', asanaId: currentPoseId, source: 'client-camera' }));
    }
  };
  
  ws.onclose = () => {
    setStatus('连接已断开', false);
    ws = null;
    stopClientCamera();
  };
  
  ws.onerror = () => {
    setStatus('连接错误', false);
  };
  
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

// ── Ensure WS connected ──
// Connects (if needed) and resolves once the socket is OPEN, so callers can
// safely send immediately after. Without this, a FileReader.onload can fire
// before the socket opens and the start message is silently dropped.
function ensureConnected() {
  connect();
  return new Promise((resolve) => {
    if (ws && ws.readyState === WebSocket.OPEN) { resolve(); return; }
    const check = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) { clearInterval(check); resolve(); }
    }, 50);
    setTimeout(() => { clearInterval(check); resolve(); }, 5000);
  });
}

// ── Message Handler ──
function handleMessage(msg) {
  console.log('Received message:', msg);
  
  if (msg.type === 'ready') {
    setStatus('已连接摄像头，分析中…', true);
    return;
  }
  
  if (msg.type === 'error') {
    setStatus('错误: ' + msg.msg, false);
    console.error('Server error:', msg.msg);
    return;
  }
  
  if (msg.type === 'frame') {
    drawFrame(msg);
  }
}

// ── Draw Frame ──
function drawFrame(msg) {
  const img = new Image();
  img.onload = () => {
    canvas.width = msg.width;
    canvas.height = msg.height;
    ctx.drawImage(img, 0, 0, msg.width, msg.height);
    
    const pose = (msg.poses || [])[0];
    if (pose) {
      drawSkeleton(pose.landmarks, msg.width, msg.height);
      // Anatomical muscle overlay (colored by engagement / rest level)
      if (pose.world_landmarks || msg.feedback) {
        drawMuscles(pose.landmarks, pose.world_landmarks, msg.width, msg.height, msg.feedback);
      }

      // Update feedback
      if (msg.feedback) {
        updateFromFeedback(msg.feedback);
      }
    }
  };
  // Backend sends RAW base64 (no data: header); prepend it so the <img> loads.
  // If a future payload already carries the header, don't double-prefix.
  img.src = (msg.frame && msg.frame.startsWith('data:')) ? msg.frame : 'data:image/jpeg;base64,' + msg.frame;
}

// ── Draw Skeleton ──
function drawSkeleton(landmarks, w, h) {
  if (!landmarks || !landmarks.length) return;
  
  ctx.strokeStyle = '#6c5ce7';
  ctx.lineWidth = 2;
  
  // Draw connections
  const connections = [
    [11, 12], [11, 13], [13, 15], [12, 14], [14, 16],
    [11, 23], [12, 24], [23, 24], [23, 25], [25, 27],
    [24, 26], [26, 28], [0, 1], [1, 2], [2, 3], [3, 7],
    [0, 4], [4, 5], [5, 6], [6, 8], [9, 10]
  ];
  
  ctx.beginPath();
  for (const [a, b] of connections) {
    const pa = landmarks[a], pb = landmarks[b];
    if (pa && pb) {
      ctx.moveTo(pa.x * w, pa.y * h);
      ctx.lineTo(pb.x * w, pb.y * h);
    }
  }
  ctx.stroke();
  
  // Draw points
  ctx.fillStyle = '#a29bfe';
  for (const lm of landmarks) {
    if (lm) {
      ctx.beginPath();
      ctx.arc(lm.x * w, lm.y * h, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ===== anatomical muscle overlay (ported from index.html) =====
// Muscles are drawn as longitudinal fusiform strips on the anatomically
// correct side of each limb. Side is resolved from the 3D world landmarks
// returned by the server, so it works for upright, folded and inverted poses.
let W = 0, H = 0;
const REST = 0.16;

// mirror landmark index for the opposite side of the body
const MIRROR = {11:12,12:11,13:14,14:13,15:16,16:15,23:24,24:23,25:26,26:25,27:28,28:27};

// map asanas.json muscle `id` -> frontend anatomical muscle ids
const ID_MAP = {
  hamstrings: ['hamstrings'],
  deltoids: ['deltoid', 'traps'],
  triceps: ['triceps'],
  biceps: ['biceps'],
  spinal: ['spinal'],
  calves: ['calves'],
  quads_stand: ['quads'], quads: ['quads'], quads_front: ['quads'], hip_flexors: ['quads'],
  glutes: ['glutes'], glutes_back: ['glutes'],
  obliques: ['obliques'], core: ['rectus', 'obliques'], rectus: ['rectus'],
  pectorals: ['pectoral'], pectoral: ['pectoral'], pecs: ['pectoral'], chest: ['pectoral'],
  trapezius: ['traps'], traps: ['traps'],
  forearms: ['forearm'], forearm: ['forearm'],
};

const MUSCLE_MAP = [
  {id:'deltoid',   seg:[12,14], side:'both', face:'outer', width:0.26},
  {id:'biceps',    seg:[12,14], side:'both', face:'front', width:0.18},
  {id:'triceps',   seg:[12,14], side:'both', face:'back',  width:0.18},
  {id:'forearm',   seg:[14,16], side:'both', face:'front', width:0.15},
  {id:'obliques',  seg:[12,24], side:'both', face:'outer', width:0.18},
  {id:'glutes',    seg:[24,26], side:'both', face:'back',  width:0.28},
  {id:'quads',     seg:[24,26], side:'both', face:'front', width:0.20},
  {id:'hamstrings',seg:[24,26], side:'both', face:'back',  width:0.18},
  {id:'calves',    seg:[26,28], side:'both', face:'back',  width:0.18},
];

function lerpPt(a,b,t){ return {x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t}; }
function vec3(a,b){ return {x:b.x-a.x, y:b.y-a.y, z:b.z-a.z}; }
function len3(v){ return Math.hypot(v.x,v.y,v.z)||1; }
function norm3(v){ const l=len3(v); return {x:v.x/l, y:v.y/l, z:v.z/l}; }
function dot3(a,b){ return a.x*b.x+a.y*b.y+a.z*b.z; }
function lerp3(a,b,t){ return {x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, z:a.z+(b.z-a.z)*t}; }

// Per-muscle engagement estimated from the CURRENT joint angle (live pose),
// compared to an anatomical neutral angle — mirrors the 3D avatar's model so
// the 2D overlay color reflects the user's ACTUAL muscle state, not the static
// prescription scaled by overall match score.
//   stretch = 0.5 - 0.5 * clamp( dir*(curAngle - neutral) / RANGE, -1, 1 )
//   => 0 (blue) = stretched, 0.5 (neutral) = at rest, 1 (red) = contracted.
function angleDeg(world, a, b, c){
  const A = world[a], B = world[b], C = world[c];
  if (!A || !B || !C) return null;
  const v1x=A.x-B.x, v1y=A.y-B.y, v1z=A.z-B.z;
  const v2x=C.x-B.x, v2y=C.y-B.y, v2z=C.z-B.z;
  const l1 = Math.hypot(v1x,v1y,v1z)||1e-6, l2 = Math.hypot(v2x,v2y,v2z)||1e-6;
  let cos = (v1x*v2x+v1y*v2y+v1z*v2z)/(l1*l2);
  cos = Math.max(-1, Math.min(1, cos));
  return Math.acos(cos)*180/Math.PI;
}
const STRETCH_RANGE = 60;
const STRETCH_CFG = {
  deltoid:   {joint:[11,12,14], dir:+1, neutral:90},
  biceps:    {joint:[12,14,16], dir:+1, neutral:175},
  triceps:   {joint:[12,14,16], dir:-1, neutral:175},
  forearm:   {joint:[12,14,16], dir:+1, neutral:175},
  obliques:  {joint:[11,12,24], dir:+1, neutral:120},
  glutes:    {joint:[12,24,26], dir:-1, neutral:170},
  quads:     {joint:[24,26,28], dir:-1, neutral:175},
  hamstrings:{joint:[24,26,28], dir:+1, neutral:175},
  calves:    {joint:[24,26,28], dir:+1, neutral:175},
  pectoral:  {joint:[11,12,14], dir:+1, neutral:90},
  rectus:    {joint:[11,23,24], dir:+1, neutral:90},
  traps:     {joint:[11,12,14], dir:+1, neutral:90},
  spinal:    {joint:[11,23,24], dir:+1, neutral:90},
};
function mirrorJoint(j){ return j.map(i => MIRROR[i] != null ? MIRROR[i] : i); }
// side: 0 = primary (right) segment, 1 = mirrored (left) segment.
function stretchOf(id, world, side){
  const cfg = STRETCH_CFG[id];
  if (!cfg || !world) return null;
  const joint = side === 0 ? cfg.joint : mirrorJoint(cfg.joint);
  const cur = angleDeg(world, joint[0], joint[1], joint[2]);
  if (cur == null) return null;
  const dev = cfg.dir * (cur - cfg.neutral);
  return 0.5 - 0.5 * Math.max(-1, Math.min(1, dev / STRETCH_RANGE));
}

function torsoFront3D(world){
  const hip = lerp3(world[23], world[24], 0.5);
  const nose = world[0];
  if (!hip || !nose || nose.v < 0.3) return null;
  return norm3(vec3(hip, nose));
}
function torsoCenter3D(world){
  const shoulder = lerp3(world[11], world[12], 0.5);
  const hip = lerp3(world[23], world[24], 0.5);
  if (!shoulder || !hip) return null;
  return lerp3(shoulder, hip, 0.5);
}

// 2D torso-front direction (image pixels): from torso center toward the nose.
function torsoFront2D(landmarks){
  const A = landmarks[11], B = landmarks[12], C = landmarks[23], D = landmarks[24];
  if (!A || !B || !C || !D) return null;
  const cx = ((A.x+B.x)/2 + (C.x+D.x)/2) * 0.5 * W;
  const cy = ((A.y+B.y)/2 + (C.y+D.y)/2) * 0.5 * H;
  const nose = landmarks[0];
  if (!nose || nose.v < 0.3) return null;
  const fx = nose.x*W - cx, fy = nose.y*H - cy;
  const fl = Math.hypot(fx, fy);
  if (fl < 0.01 * Math.hypot(W, H)) return null;
  return {x: fx/fl, y: fy/fl};
}

// Resolve a 2D unit normal (image pixel space) from the bone toward the
// requested anatomical face. Uses 3D world landmarks for stability.
function limbNormal2D(pa, pb, wa, wb, world, face){
  if (!wa || !wb || !world) return null;
  const d = vec3(wa, wb);
  const du = norm3(d);
  let n3 = null;
  if (face === 'front' || face === 'back'){
    const f = torsoFront3D(world);
    if (!f) return null;
    const fd = dot3(f, du);
    const perp = {x: f.x - fd*du.x, y: f.y - fd*du.y, z: f.z - fd*du.z};
    const pl = len3(perp);
    if (pl < 0.05) return null;
    n3 = norm3(perp);
    if (face === 'back') n3 = {x:-n3.x, y:-n3.y, z:-n3.z};
  } else if (face === 'inner' || face === 'outer'){
    const tc = torsoCenter3D(world);
    if (!tc) return null;
    const mid = lerp3(wa, wb, 0.5);
    const toTorso = vec3(mid, tc);
    const td = dot3(toTorso, du);
    const perp = {x: toTorso.x - td*du.x, y: toTorso.y - td*du.y, z: toTorso.z - td*du.z};
    const pl = len3(perp);
    if (pl < 0.001) return null;
    n3 = norm3(perp);
    if (face === 'outer') n3 = {x:-n3.x, y:-n3.y, z:-n3.z};
  }
  if (!n3) return null;
  const nx = n3.x, ny = -n3.y, nz = n3.z;
  const xyLen = Math.hypot(nx, ny);
  if (xyLen < 0.15 || Math.abs(nz) > xyLen) return null;
  return {nx: nx/xyLen, ny: ny/xyLen};
}

function drawFusiform(pa, pb, n, widthFactor, lvl){
  const dx = pb.x - pa.x, dy = pb.y - pa.y;
  const len = Math.hypot(dx, dy) || 1;
  const maxW = widthFactor * len;
  if (maxW < 4) return;
  const endW = maxW * 0.12;
  const belly = lerpPt(pa, pb, 0.5);
  const col = heatRGB(lvl);
  const alpha = 0.45 + 0.40 * lvl;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(pa.x + n.nx*endW, pa.y + n.ny*endW);
  ctx.quadraticCurveTo(belly.x + n.nx*maxW, belly.y + n.ny*maxW,
                       pb.x + n.nx*endW, pb.y + n.ny*endW);
  ctx.lineTo(pb.x, pb.y); ctx.lineTo(pa.x, pa.y);
  ctx.closePath();
  const mid = [Math.min(255,col[0]+35), Math.min(255,col[1]+30), Math.min(255,col[2]+30)];
  const grad = ctx.createLinearGradient(pa.x, pa.y, belly.x + n.nx*maxW, belly.y + n.ny*maxW);
  grad.addColorStop(0, `rgb(${col[0]},${col[1]},${col[2]})`);
  grad.addColorStop(0.55, `rgb(${mid[0]},${mid[1]},${mid[2]})`);
  grad.addColorStop(1, `rgb(${col[0]},${col[1]},${col[2]})`);
  ctx.fillStyle = grad;
  ctx.strokeStyle = `rgba(${Math.max(0,col[0]-40)},${Math.max(0,col[1]-40)},${Math.max(0,col[2]-40)},0.9)`;
  ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
  ctx.fill(); ctx.stroke();
  ctx.lineWidth = 1.1;
  ctx.strokeStyle = 'rgba(255,242,242,0.38)';
  ctx.globalAlpha = alpha * 0.75;
  const nF = 5;
  for (let i = 0; i < nF; i++){
    const f = i / (nF - 1);
    const startOff = f * endW;
    const midOff = f * maxW;
    const endOff = f * endW;
    ctx.beginPath();
    ctx.moveTo(pa.x + n.nx*startOff, pa.y + n.ny*startOff);
    ctx.quadraticCurveTo(belly.x + n.nx*midOff, belly.y + n.ny*midOff,
                         pb.x + n.nx*endOff, pb.y + n.ny*endOff);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBelly(pa, pb, wa, wb, m, lvl, worldLandmarks){
  let n = limbNormal2D(pa, pb, wa, wb, worldLandmarks, m.face);
  if (!n && (m.face === 'front' || m.face === 'back')){
    n = limbNormal2D(pa, pb, wa, wb, worldLandmarks, 'outer');
  }
  if (!n) return;
  drawFusiform(pa, pb, n, m.width, lvl);
}

function drawSpecialMuscles(landmarks, worldLandmarks, fbMap){
  if (!worldLandmarks) return;
  const P = i => landmarks[i] ? {x:landmarks[i].x*W, y:landmarks[i].y*H, v:landmarks[i].v} : null;
  const W3 = i => worldLandmarks[i] || null;
  const A = landmarks[11], B = landmarks[12], C = landmarks[23], D = landmarks[24];
  if (!A || !B || !C || !D) return;
  if ((A.v !== undefined && A.v < 0.3) || (B.v !== undefined && B.v < 0.3) ||
      (C.v !== undefined && C.v < 0.3) || (D.v !== undefined && D.v < 0.3)) return;
  const wShMid = lerp3(W3(11), W3(12), 0.5), wHipMid = lerp3(W3(23), W3(24), 0.5);
  if (!wShMid || !wHipMid) return;
  const shMid = lerpPt(P(11), P(12), 0.5), hipMid = lerpPt(P(23), P(24), 0.5);
  const chest = lerpPt(shMid, hipMid, 0.32);
  const wChest = lerp3(wShMid, wHipMid, 0.32);
  const neck = {x: shMid.x, y: shMid.y - (hipMid.y-shMid.y)*0.30};
  const wNeck = {x: wShMid.x, y: wShMid.y - (wHipMid.y-wShMid.y)*0.30, z: wShMid.z};
  for (const s of [11,12]){
    const sh = P(s); const wSh = W3(s);
    if (!sh || !wSh) continue;
    const stP = stretchOf('pectoral', worldLandmarks, s===12?0:1);
    const lvlP = stP!=null ? stP : (fbMap['pectoral']!=null?fbMap['pectoral']:REST);
    drawBelly(sh, chest, wSh, wChest, {face:'front', width:0.30}, lvlP, worldLandmarks);
  }
  for (const s of [11,12]){
    const top = P(s), bot = P(s===11?23:24);
    const wTop = W3(s===11?11:12), wBot = W3(s===11?23:24);
    if (!top || !bot || !wTop || !wBot) continue;
    const stR = stretchOf('rectus', worldLandmarks, s===12?0:1);
    const lvl = stR!=null ? stR : (fbMap['rectus']!=null?fbMap['rectus']:REST);
    for (let k = 0; k < 3; k++){
      const t0 = 0.12+k*0.28, t1 = 0.32+k*0.28;
      const a = lerpPt(top, bot, t0), b = lerpPt(top, bot, t1);
      const wa = lerp3(wTop, wBot, t0), wb = lerp3(wTop, wBot, t1);
      drawBelly(a, b, wa, wb, {face:'front', width:0.12}, lvl, worldLandmarks);
    }
  }
  const nose = P(0), wNose = W3(0);
  const front = torsoFront2D(landmarks);
  for (const s of [11,12]){
    const sh = P(s), wSh = W3(s);
    if (!sh || !wSh) continue;
    const neckPt = (nose && nose.v > 0.3) ? lerpPt(sh, nose, 0.5) : neck;
    let dx = neckPt.x - sh.x, dy = neckPt.y - sh.y;
    let nx = -dy, ny = dx;
    const nl = Math.hypot(nx, ny) || 1; nx /= nl; ny /= nl;
    if (front){ const dotF = nx*front.x + ny*front.y; if (dotF > 0){ nx = -nx; ny = -ny; } }
    const stT = stretchOf('traps', worldLandmarks, s===12?0:1);
    const lvlT = stT!=null ? stT : (fbMap['traps']!=null?fbMap['traps']:REST);
    drawFusiform(sh, neckPt, {nx, ny}, 0.20, lvlT);
  }
  const sdx = hipMid.x-shMid.x, sdy = hipMid.y-shMid.y, slen = Math.hypot(sdx,sdy)||1, snx = -sdy/slen, sny = sdx/slen;
  for (const side of [-1,1]){
    const stE = stretchOf('spinal', worldLandmarks, side===1?0:1);
    const lvlE = stE!=null ? stE : (fbMap['spinal']!=null?fbMap['spinal']:REST);
    const a = lerpPt(shMid, hipMid, 0.15), b = lerpPt(shMid, hipMid, 0.85);
    const wa = lerp3(wShMid, wHipMid, 0.15), wb = lerp3(wShMid, wHipMid, 0.85);
    const off = side * slen * 0.05;
    drawBelly({x:a.x+snx*off, y:a.y+sny*off},
              {x:b.x+snx*off, y:b.y+sny*off},
              wa, wb, {face:'back', width:0.08}, lvlE, worldLandmarks);
  }
}

function drawMuscles(landmarks, worldLandmarks, w, h, feedback){
  W = w; H = h;
  const fbMap = {};
  if (feedback && feedback.muscles)
    for (const m of feedback.muscles){
      let fids = ID_MAP[m.id];
      if (!fids) { console.warn('[muscle] no ID_MAP entry for', m.id); fids = [m.id]; }
      for (const fid of fids) fbMap[fid] = m.live != null ? m.live : m.level;
    }
  for (const m of MUSCLE_MAP){
    const segs = m.side === 'both' ? [m.seg, [MIRROR[m.seg[0]], MIRROR[m.seg[1]]]] : [m.seg];
    segs.forEach((sg, idx) => {
      const pa = landmarks[sg[0]], pb = landmarks[sg[1]];
      if (!pa || !pb) return;
      if ((pa.v !== undefined && pa.v < 0.5) || (pb.v !== undefined && pb.v < 0.5)) return;
      const wa = worldLandmarks ? worldLandmarks[sg[0]] : null;
      const wb = worldLandmarks ? worldLandmarks[sg[1]] : null;
      let lvl = fbMap[m.id] != null ? fbMap[m.id] : REST;
      const st = stretchOf(m.id, worldLandmarks, idx);   // idx 0 = primary, 1 = mirror
      if (st != null) lvl = st;                           // live pose overrides static target
      drawBelly({x:pa.x*w, y:pa.y*h}, {x:pb.x*w, y:pb.y*h}, wa, wb, m, lvl, worldLandmarks);
    });
  }
  drawSpecialMuscles(landmarks, worldLandmarks, fbMap);
}

function heatRGB(l){
  l = Math.max(0, Math.min(1, l));
  let c;
  if (l < 0.5){
    const t = l/0.5;
    c = [59 + (245-59)*t, 130 + (158-130)*t, 246 + (11-246)*t];
  } else {
    const t = (l-0.5)/0.5;
    c = [245 + (239-245)*t, 158 + (68-158)*t, 11 + (68-11)*t];
  }
  return [c[0]|0, c[1]|0, c[2]|0];
}

// ── Update from Feedback ──
function updateFromFeedback(feedback) {
  // Update score
  const score = feedback.score || 0;
  updateScore(score);
  
  // Update detected pose
  if (feedback.detected) {
    const det = feedback.detected;
    const meta = ASANA_MAP[det.id];
    document.getElementById('poseName').textContent = det.name_zh || det.name_en || det.id;
    document.getElementById('poseSanskrit').textContent = meta ? meta.name_sanskrit : '';
  }
  
  // Update feedback items
  const items = [];
  if (feedback.items) {
    for (const item of feedback.items) {
      const status = item.status || 'ok';
      const icon = status === 'ok' ? '✓' : status === 'warn' ? '⚠' : '✗';
      const iconClass = status === 'ok' ? 'ok' : status === 'warn' ? 'warn' : 'off';
      items.push({
        icon: icon,
        type: iconClass,
        title: item.label || item.id,
        detail: item.correction || '',
        value: item.value ? `${item.value} → ${item.target}` : ''
      });
    }
  }
  
  if (items.length > 0) {
    updateFeedback(items);
  }
  
  // Add to history if high confidence
  if (feedback.detected && feedback.score >= 70) {
    addToHistory(feedback.detected.id, feedback.detected.name_zh, feedback.score);
  }
}

// ── Update Score Ring ──
function updateScore(score) {
  const circumference = 2 * Math.PI * 36;
  const offset = circumference - (score / 100) * circumference;
  const circle = document.getElementById('scoreCircle');
  const text = document.getElementById('scoreText');
  
  circle.style.strokeDashoffset = offset;
  text.textContent = `${Math.round(score)}%`;
  
  if (score >= 80) {
    circle.style.stroke = 'var(--success)';
  } else if (score >= 50) {
    circle.style.stroke = 'var(--warning)';
  } else {
    circle.style.stroke = 'var(--danger)';
  }
}

// ── Update Feedback ──
function updateFeedback(items) {
  const list = document.getElementById('feedbackList');
  list.innerHTML = items.map(item => `
    <div class="feedback-item">
      <div class="feedback-icon ${item.type}">${item.icon}</div>
      <div class="feedback-content">
        <div class="feedback-title">${item.title}</div>
        <div class="feedback-detail">${item.detail}</div>
        ${item.value ? `<div class="feedback-value">${item.value}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ── Add to History ──
function addToHistory(poseId, poseName, score) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  
  poseHistory.unshift({
    id: poseId,
    name: poseName,
    score: score,
    time: timeStr
  });
  
  if (poseHistory.length > MAX_HISTORY) {
    poseHistory = poseHistory.slice(0, MAX_HISTORY);
  }
  
  renderHistory();
}

// ── Render History ──
function renderHistory() {
  const list = document.getElementById('historyList');
  if (poseHistory.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:var(--text-dim); padding:16px; font-size:12px;">暂无记录</div>';
    return;
  }
  
  list.innerHTML = poseHistory.map(item => `
    <div class="history-item">
      <span class="history-time">${item.time}</span>
      <span class="history-name">${item.name}</span>
      <span class="history-score">${item.score}%</span>
    </div>
  `).join('');
}

// ── Client Camera ──
async function startClientCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('浏览器不支持摄像头', false);
    return;
  }
  
  setStatus('正在请求摄像头权限…', false);
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 } },
      audio: false
    });
    
    clientCam = stream;
    const v = document.createElement('video');
    v.srcObject = stream;
    v.muted = true;
    v.playsInline = true;
    clientVideo = v;
    await v.play();
    
    // Connect and start streaming
    connect();
    
    // Wait for WebSocket to be open
    const waitForOpen = () => {
      return new Promise((resolve) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          resolve();
        } else {
          const check = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
              clearInterval(check);
              resolve();
            }
          }, 50);
          // Timeout after 5 seconds
          setTimeout(() => {
            clearInterval(check);
            resolve();
          }, 5000);
        }
      });
    };
    
    await waitForOpen();
    
    if (ws && ws.readyState === WebSocket.OPEN) {
      activeStream = { mode: 'client-camera' };
      ws.send(JSON.stringify({ type: 'start', asanaId: currentPoseId, source: 'client-camera' }));
      loopClientCamera();
      document.getElementById('btnCamera').textContent = '⏸ 暂停';
      isRunning = true;
      setStatus('摄像头已启动', true);
    } else {
      setStatus('WebSocket连接失败', false);
    }
  } catch (err) {
    setStatus('摄像头打开失败: ' + err.message, false);
  }
}

function loopClientCamera() {
  const c = document.createElement('canvas');
  const cx = c.getContext('2d');
  let last = 0;
  
  const tick = () => {
    if (!clientCam || !clientVideo) return;
    
    const vw = clientVideo.videoWidth, vh = clientVideo.videoHeight;
    const now = performance.now();
    
    if (vw && vh && now - last >= 100) { // ~10 fps
      last = now;
      const scale = Math.min(1, 640 / Math.max(vw, vh));
      const w = Math.round(vw * scale), h = Math.round(vh * scale);
      c.width = w;
      c.height = h;
      cx.drawImage(clientVideo, 0, 0, w, h);
      const data = c.toDataURL('image/jpeg', 0.7);
      
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'frame', data }));
      }
    }
    
    clientCamRAF = requestAnimationFrame(tick);
  };
  
  clientCamRAF = requestAnimationFrame(tick);
}

function stopClientCamera() {
  if (clientCamRAF) {
    cancelAnimationFrame(clientCamRAF);
    clientCamRAF = null;
  }
  if (clientCam) {
    clientCam.getTracks().forEach(t => t.stop());
    clientCam = null;
  }
  clientVideo = null;
}

// ── Status ──
function setStatus(text, connected) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').classList.toggle('connected', connected);
}

// ── Setup Event Listeners ──
function setupEventListeners() {
  // Camera button
  document.getElementById('btnCamera').addEventListener('click', () => {
    if (isRunning) {
      // Stop
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop' }));
      }
      stopClientCamera();
      document.getElementById('btnCamera').textContent = '▶ 启动摄像头';
      isRunning = false;
    } else {
      // Start
      startClientCamera();
    }
  });
  
  // Stop button
  document.getElementById('btnStop').addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'stop' }));
    }
    stopClientCamera();
    document.getElementById('btnCamera').textContent = '▶ 启动摄像头';
    isRunning = false;
  });
  
  // Auto-detect checkbox
  document.getElementById('chkAuto').addEventListener('change', (e) => {
    if (e.target.checked) {
      currentPoseId = '__auto__';
    } else {
      currentPoseId = null;
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'start', asanaId: currentPoseId, source: 'client-camera' }));
    }
  });
  
  // Search
  document.getElementById('poseSearch').addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase();
    const filtered = POSES.filter(p => 
      p.name.includes(query) || 
      p.en.toLowerCase().includes(query) ||
      p.sk.toLowerCase().includes(query)
    );
    renderPoseList(filtered);
  });
  
  // File upload
  document.getElementById('fileImage').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) uploadFile(file, 'image');
  });
  
  document.getElementById('fileVideo').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) uploadFile(file, 'video');
  });
  
  // Screenshot
  document.getElementById('btnSnap').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'yoga-screenshot.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
  
  // Fullscreen
  document.getElementById('btnFullscreen').addEventListener('click', () => {
    const container = document.querySelector('.video-container');
    if (container.requestFullscreen) {
      container.requestFullscreen();
    }
  });
}

// ── Upload File ──
async function uploadFile(file, type) {
  setStatus('正在上传 ' + file.name + '…', false);
  
  try {
    await ensureConnected();
    
    if (type === 'image') {
      // Image: read as dataURL and send via WebSocket
      const reader = new FileReader();
      reader.onload = () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ 
            type: 'start', 
            asanaId: currentPoseId, 
            source: 'image',
            data: reader.result
          }));
        }
      };
      reader.readAsDataURL(file);
    } else {
      // Video: upload to server first, then send path
      const formData = new FormData();
      formData.append('file', file);
      
      const res = await fetch(BASE + '/api/upload', { method: 'POST', body: formData });
      if (!res.ok) {
        throw new Error(`Upload failed: ${res.status}`);
      }
      
      const result = await res.json();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ 
          type: 'start', 
          asanaId: currentPoseId, 
          source: result.kind,
          path: result.path
        }));
      }
    }
  } catch (err) {
    setStatus('上传失败: ' + err.message, false);
  }
}

// ── Initialize ──
init();
